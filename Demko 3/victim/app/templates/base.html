<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ByteLog{% endblock %}</title>
    <!-- Jinja2 template engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        .prose p      { @apply text-gray-600 leading-7 mb-4; }
        .prose h2     { @apply text-xl font-bold text-gray-900 mt-8 mb-3; }
        .prose h3     { @apply text-lg font-semibold text-gray-900 mt-6 mb-2; }
        .prose ul     { @apply list-disc pl-5 mb-4 space-y-1 text-gray-600; }
        .prose ol     { @apply list-decimal pl-5 mb-4 space-y-1 text-gray-600; }
        .prose li     { @apply leading-7; }
        .prose a      { @apply text-orange-500 hover:text-orange-600 underline underline-offset-2; }
        .prose strong { @apply font-semibold text-gray-900; }
        .prose pre    { @apply bg-gray-900 text-gray-100 rounded-xl p-5 overflow-x-auto text-sm my-5 leading-relaxed; }
        .prose code   { @apply bg-orange-50 text-orange-600 rounded-md px-1.5 py-0.5 text-[0.85em] font-mono; }
        .prose pre code { @apply bg-transparent text-gray-100 p-0; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col antialiased">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-8 py-4 flex items-center justify-between">
            <a href="{{ url_for('blog.index') }}" class="font-mono font-bold text-xl tracking-tight group">
                <span class="text-orange-500">&lt;</span><span class="group-hover:text-orange-500 transition-colors">ByteLog</span><span class="text-orange-500">/&gt;</span>
            </a>
            <nav class="flex items-center gap-2">
                <a href="{{ url_for('blog.index') }}" class="text-sm font-medium text-gray-700 hover:text-orange-500 hover:bg-orange-50 px-4 py-2 rounded-full transition-colors">Posts</a>
                <a href="{{ url_for('blog.write') }}" class="text-sm font-semibold bg-orange-500 hover:bg-orange-600 text-white px-5 py-2 rounded-full transition-colors shadow-sm">+ Write</a>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-8 py-12 flex-1 w-full">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-200 bg-white py-6 text-center text-xs text-gray-400">
        ByteLog &mdash; A developer's notebook
    </footer>

    <script>
        (function () {
            function connect() {
                var es = new EventSource('/stream');
                es.addEventListener('reload', function () { window.location.reload(); });
                es.onerror = function () { es.close(); setTimeout(connect, 3000); };
            }
            connect();
        })();
    </script>
</body>
</html>
